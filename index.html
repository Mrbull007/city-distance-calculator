<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>City Distance Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .result-card { animation: fadeIn 0.4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-950 min-h-screen">
  <div class="max-w-2xl mx-auto p-6">
    <div class="text-center mb-10 mt-8">
      <h1 class="text-4xl font-bold text-indigo-700 dark:text-indigo-400 flex items-center justify-center gap-3">
        <i class="fas fa-map-marked-alt"></i> City Distance
      </h1>
      <p class="text-gray-600 dark:text-gray-400 mt-2">Calculate straight-line distance between any two cities</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
      <!-- From City -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">From City</label>
        <input id="from" type="text" placeholder="e.g. Bhavnagar, India" 
               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700"/>
      </div>

      <!-- To City -->
      <div class="mb-8">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">To City</label>
        <input id="to" type="text" placeholder="e.g. Mumbai, India" 
               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700"/>
      </div>

      <button onclick="calculateDistance()" 
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl transition flex items-center justify-center gap-2 text-lg">
        <i class="fas fa-ruler"></i> Calculate Distance
      </button>

      <!-- Result Area -->
      <div id="result" class="mt-8 hidden result-card"></div>
    </div>

    <div class="text-center text-xs text-gray-500 dark:text-gray-400 mt-10">
      Powered by OpenStreetMap Nominatim • Straight-line (as-the-crow-flies) distance
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
